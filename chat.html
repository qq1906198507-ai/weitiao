<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LoRA Chat Demo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .header {
            background: #1a1a2e;
            color: white;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 {
            font-size: 1.2rem;
            font-weight: 500;
        }
        .status {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.85rem;
        }
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #22c55e;
        }
        .status-dot.offline {
            background: #ef4444;
        }
        .container {
            flex: 1;
            display: flex;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
            padding: 1rem;
            gap: 1rem;
        }
        .sidebar {
            width: 250px;
            background: white;
            border-radius: 12px;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .setting-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        .setting-group label {
            font-size: 0.85rem;
            color: #666;
            font-weight: 500;
        }
        .setting-group input[type="range"] {
            width: 100%;
        }
        .setting-group .value {
            font-size: 0.8rem;
            color: #888;
            text-align: right;
        }
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: white;
            border-radius: 12px;
            overflow: hidden;
        }
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .message {
            display: flex;
            gap: 0.75rem;
            max-width: 85%;
        }
        /* 用户消息 - 右侧 */
        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }
        /* AI 消息 - 左侧 */
        .message.assistant {
            align-self: flex-start;
        }
        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            flex-shrink: 0;
        }
        .message.user .avatar {
            background: #3b82f6;
            color: white;
        }
        .message.assistant .avatar {
            background: #10b981;
            color: white;
        }
        .content {
            background: #f3f4f6;
            padding: 0.75rem 1rem;
            border-radius: 12px;
            font-size: 0.95rem;
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .message.user .content {
            background: #3b82f6;
            color: white;
        }
        .loading {
            display: flex;
            gap: 4px;
            padding: 0.5rem 0;
        }
        .loading span {
            width: 8px;
            height: 8px;
            background: #10b981;
            border-radius: 50%;
            animation: bounce 1s infinite;
        }
        .loading span:nth-child(2) { animation-delay: 0.1s; }
        .loading span:nth-child(3) { animation-delay: 0.2s; }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .input-area {
            padding: 1rem 1.5rem;
            border-top: 1px solid #e5e7eb;
            display: flex;
            gap: 0.75rem;
        }
        .input-area textarea {
            flex: 1;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            padding: 0.75rem 1rem;
            font-size: 0.95rem;
            resize: none;
            outline: none;
            transition: border-color 0.2s;
            font-family: inherit;
        }
        .input-area textarea:focus {
            border-color: #3b82f6;
        }
        .input-area button {
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 12px;
            padding: 0.75rem 1.5rem;
            font-size: 0.95rem;
            cursor: pointer;
            transition: background 0.2s;
        }
        .input-area button:hover:not(:disabled) {
            background: #2563eb;
        }
        .input-area button:disabled {
            background: #9ca3af;
            cursor: not-allowed;
        }
        .clear-btn {
            background: #f3f4f6;
            color: #666;
            border: none;
            border-radius: 8px;
            padding: 0.5rem 1rem;
            cursor: pointer;
            font-size: 0.85rem;
        }
        .clear-btn:hover {
            background: #e5e7eb;
        }
        .new-chat-btn {
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 0.75rem;
            cursor: pointer;
            font-size: 0.9rem;
        }
        .new-chat-btn:hover {
            background: #2563eb;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🤖 LoRA Fine-tuned Chat</h1>
        <div class="status">
            <span class="status-dot" id="statusDot"></span>
            <span id="statusText">检查中...</span>
        </div>
    </div>

    <div class="container">
        <div class="sidebar">
            <button class="new-chat-btn" onclick="clearChat()">📝 新对话</button>

            <div class="setting-group">
                <label>API 地址</label>
                <input type="text" id="apiUrl" value="http://localhost:8000"
                    style="padding: 0.5rem; border: 1px solid #e5e7eb; border-radius: 6px; width: 100%;">
            </div>

            <div class="setting-group" style="flex-direction: row; align-items: center;">
                <input type="checkbox" id="streamMode" checked style="width: 18px; height: 18px;">
                <label style="margin: 0;">流式输出</label>
            </div>

            <div class="setting-group">
                <label>Max Tokens: <span class="value" id="maxTokensValue">512</span></label>
                <input type="range" id="maxTokens" min="64" max="2048" value="512" step="64">
            </div>

            <div class="setting-group">
                <label>Temperature: <span class="value" id="tempValue">0.7</span></label>
                <input type="range" id="temperature" min="0" max="2" value="0.7" step="0.1">
            </div>

            <div class="setting-group">
                <label>Top P: <span class="value" id="topPValue">0.9</span></label>
                <input type="range" id="topP" min="0" max="1" value="0.9" step="0.05">
            </div>

            <button class="clear-btn" onclick="testConnection()">🔄 测试连接</button>
        </div>

        <div class="chat-area">
            <div class="messages" id="messages">
                <div class="message assistant">
                    <div class="avatar">🤖</div>
                    <div class="content">你好！我是微调后的 AI 助手。有什么我可以帮助你的吗？</div>
                </div>
            </div>

            <div class="input-area">
                <textarea id="userInput" rows="2" placeholder="输入消息...（Enter 发送，Shift+Enter 换行）"
                    onkeydown="handleKeydown(event)"></textarea>
                <button id="sendBtn" onclick="sendMessage()">发送</button>
            </div>
        </div>
    </div>

    <script>
        let isStreaming = false;
        let currentAssistantContentDiv = null;  // 当前流式输出的内容区域
        let messageHistory = [{"role": "assistant", "content": "你好！我是微调后的 AI 助手。有什么我可以帮助你的吗？"}];

        // 更新滑块显示值
        document.getElementById('maxTokens').addEventListener('input', (e) => {
            document.getElementById('maxTokensValue').textContent = e.target.value;
        });
        document.getElementById('temperature').addEventListener('input', (e) => {
            document.getElementById('tempValue').textContent = e.target.value;
        });
        document.getElementById('topP').addEventListener('input', (e) => {
            document.getElementById('topPValue').textContent = e.target.value;
        });

        function handleKeydown(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }

        async function testConnection() {
            const apiUrl = document.getElementById('apiUrl').value;
            try {
                const response = await fetch(apiUrl);
                const data = await response.json();
                if (data.status === 'ok') {
                    updateStatus(true, data.model);
                } else {
                    updateStatus(false, '响应异常');
                }
            } catch (error) {
                updateStatus(false, '连接失败');
            }
        }

        function updateStatus(online, model) {
            const dot = document.getElementById('statusDot');
            const text = document.getElementById('statusText');
            if (online) {
                dot.classList.remove('offline');
                text.textContent = model || '在线';
            } else {
                dot.classList.add('offline');
                text.textContent = model || '离线';
            }
        }

        // 添加用户消息（右侧）
        function addUserMessage(content) {
            const messagesDiv = document.getElementById('messages');
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message user';

            const avatar = document.createElement('div');
            avatar.className = 'avatar';
            avatar.textContent = '👤';

            const contentDiv = document.createElement('div');
            contentDiv.className = 'content';
            contentDiv.textContent = content;

            messageDiv.appendChild(avatar);
            messageDiv.appendChild(contentDiv);
            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        // 添加 AI 助手消息（左侧），带加载动画
        function addAssistantPlaceholder() {
            const messagesDiv = document.getElementById('messages');
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message assistant';

            const avatar = document.createElement('div');
            avatar.className = 'avatar';
            avatar.textContent = '🤖';

            const contentDiv = document.createElement('div');
            contentDiv.className = 'content';
            contentDiv.innerHTML = '<div class="loading"><span></span><span></span><span></span></div>';

            messageDiv.appendChild(avatar);
            messageDiv.appendChild(contentDiv);
            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;

            return contentDiv;  // 返回内容区域供后续更新
        }

        // 更新助手消息内容（流式输出）
        function updateAssistantContent(contentDiv, text) {
            if (!contentDiv) return;

            // 移除加载动画（如果还在）
            const loading = contentDiv.querySelector('.loading');
            if (loading) {
                loading.remove();
            }

            // 追加文本
            contentDiv.textContent += text;

            // 滚动到底部
            const messagesDiv = document.getElementById('messages');
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        // 完成助手消息，保存到历史
        function finalizeAssistantContent(contentDiv) {
            if (!contentDiv) return;

            const text = contentDiv.textContent;
            messageHistory.push({"role": "assistant", "content": text});
        }

        function clearChat() {
            document.getElementById('messages').innerHTML = `
                <div class="message assistant">
                    <div class="avatar">🤖</div>
                    <div class="content">你好！我是微调后的 AI 助手。有什么我可以帮助你的吗？</div>
                </div>
            `;
            messageHistory = [{"role": "assistant", "content": "你好！我是微调后的 AI 助手。有什么我可以帮助你的吗？"}];
            currentAssistantContentDiv = null;
        }

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const sendBtn = document.getElementById('sendBtn');
            const message = input.value.trim();

            if (!message || isStreaming) return;

            const apiUrl = document.getElementById('apiUrl').value;
            const streamMode = document.getElementById('streamMode').checked;
            const maxTokens = parseInt(document.getElementById('maxTokens').value);
            const temperature = parseFloat(document.getElementById('temperature').value);
            const topP = parseFloat(document.getElementById('topP').value);

            // 1. 添加用户消息到右侧
            addUserMessage(message);
            messageHistory.push({"role": "user", "content": message});

            // 2. 清空输入框并禁用按钮
            input.value = '';
            sendBtn.disabled = true;
            isStreaming = true;

            // 3. 添加助手占位到左侧
            currentAssistantContentDiv = addAssistantPlaceholder();

            try {
                if (streamMode) {
                    await sendStreamRequest(apiUrl, message, maxTokens, temperature, topP);
                } else {
                    await sendNormalRequest(apiUrl, message, maxTokens, temperature, topP);
                }
            } catch (error) {
                console.error('Error:', error);
                updateAssistantContent(currentAssistantContentDiv, `❌ 请求失败: ${error.message}`);
                finalizeAssistantContent(currentAssistantContentDiv);
            } finally {
                sendBtn.disabled = false;
                isStreaming = false;
                currentAssistantContentDiv = null;
            }
        }

        async function sendNormalRequest(apiUrl, message, maxTokens, temperature, topP) {
            const response = await fetch(`${apiUrl}/chat`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    message: message,
                    max_new_tokens: maxTokens,
                    temperature: temperature,
                    top_p: topP
                })
            });

            if (!response.ok) {
                throw new Error(`HTTP ${response.status}`);
            }

            const data = await response.json();

            // 移除加载动画并显示结果
            if (currentAssistantContentDiv) {
                currentAssistantContentDiv.innerHTML = '';
                currentAssistantContentDiv.textContent = data.response;
            }

            finalizeAssistantContent(currentAssistantContentDiv);
        }

        async function sendStreamRequest(apiUrl, message, maxTokens, temperature, topP) {
            const response = await fetch(`${apiUrl}/chat/stream`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    message: message,
                    max_new_tokens: maxTokens,
                    temperature: temperature,
                    top_p: topP
                })
            });

            if (!response.ok) {
                throw new Error(`HTTP ${response.status}`);
            }

            const reader = response.body.getReader();
            const decoder = new TextDecoder();

            while (true) {
                const {done, value} = await reader.read();
                if (done) break;

                const chunk = decoder.decode(value);
                const lines = chunk.split('\n');

                for (const line of lines) {
                    if (line.startsWith('data: ')) {
                        try {
                            const data = JSON.parse(line.slice(6));

                            if (data.text) {
                                // 逐字显示在左侧助手消息框
                                updateAssistantContent(currentAssistantContentDiv, data.text);
                            }

                            if (data.done) {
                                finalizeAssistantContent(currentAssistantContentDiv);
                                return;
                            }
                        } catch (e) {
                            // 忽略解析错误的行
                        }
                    }
                }
            }

            finalizeAssistantContent(currentAssistantContentDiv);
        }

        // 页面加载时测试连接
        testConnection();
    </script>
</body>
</html>
